name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python
        run: python -m py_compile scripts/pateway_api.py
      - name: Help command should print usage without credentials
        run: python scripts/pateway_api.py || true
